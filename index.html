<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Anonym — Private conversations. Gone forever.</title>
    <meta name="description" content="Anonym is a premium, privacy-first messaging platform. Send self-destructing, end-to-end encrypted messages and open ephemeral stealth chat rooms that vanish after use." />
    <meta name="keywords" content="anonymous message, self-destructing chat, encrypted message, stealth chat, one-time note, burn after reading, secure communication, zero knowledge" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#09090b" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Anonym — Private conversations. Gone forever." />
    <meta property="og:description" content="End-to-end encrypted messages that self-destruct. Zero knowledge. No accounts. No traces." />
    <meta property="og:url" content="https://actifyai.firebaseapp.com/" />
    <meta property="og:site_name" content="Anonym" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Anonym — Private conversations. Gone forever." />
    <meta name="twitter:description" content="End-to-end encrypted messages that self-destruct. Zero knowledge. No accounts. No traces." />
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,300;1,14..32,400&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔒</text></svg>" />
    <!-- Theme init: apply before React mounts to avoid flash -->
    <script>
      (function() {
        var saved = localStorage.getItem('anonym_theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
