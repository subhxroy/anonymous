<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Anonym - End-to-End Encrypted One-Time Messages & Stealth Chat</title>
    <meta name="description" content="Anonym lets you send self-destructing, end-to-end encrypted messages and open ephemeral stealth chat rooms that disappear after 10 minutes of silence." />
    <meta name="keywords" content="anonymous message, self-destructing chat, encrypted message, stealth chat, one-time note, burn after reading, secure communication" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Anonym - Secure One-Time Messages & Stealth Chat" />
    <meta property="og:description" content="Send end-to-end encrypted notes that burn after reading, and host real-time stealth chats that vanish automatically." />
    <meta property="og:url" content="https://actifyai.firebaseapp.com/" />
    <meta property="og:site_name" content="Anonym Secure" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Anonym - Secure Encrypted Messaging" />
    <meta name="twitter:description" content="Burn after reading notes and ephemeral stealth chat rooms. Securely encrypted in-browser." />
    
    <!-- Favicon & Styling -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔒</text></svg>" />
    <!-- Theme init: apply before React mounts to avoid flash -->
    <script>
      (function() {
        var saved = localStorage.getItem('anonym_theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
